<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ice Vibe - Mesas</title>
  <link rel="stylesheet" href="css/pos-styles.css" />
  <style>
    body { overflow: auto; }

    .mesas-header {
      background: linear-gradient(135deg, #1a1f3a 0%, #1e2442 100%);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(0,191,255,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .mesas-header h1 { font-size: 1.3rem; color: #00e5ff; }
    .mesas-header p  { font-size: 0.8rem; color: #a0aec0; margin-top: 2px; }
    .header-actions  { display: flex; gap: 10px; align-items: center; }

    .btn-back {
      background: rgba(0,191,255,0.1);
      border: 1px solid rgba(0,191,255,0.3);
      color: #00bfff;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all .2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-back:hover { background: rgba(0,191,255,0.2); }

    .leyenda {
      display: flex;
      gap: 20px;
      padding: 14px 24px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-wrap: wrap;
    }
    .leyenda-item { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; color: #a0aec0; }
    .leyenda-dot  { width: 14px; height: 14px; border-radius: 50%; }
    .dot-libre    { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,.6); }
    .dot-ocupada  { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,.6); }

    .mesas-container {
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .mesa-card {
      background: linear-gradient(135deg, #1a1f3a 0%, #1e2442 100%);
      border-radius: 14px;
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      transition: all .25s;
      border: 2px solid transparent;
      user-select: none;
    }
    .mesa-card:hover { transform: translateY(-4px); }
    .mesa-card.libre {
      border-color: rgba(16,185,129,.4);
      box-shadow: 0 0 12px rgba(16,185,129,.15);
    }
    .mesa-card.libre:hover {
      border-color: #10b981;
      box-shadow: 0 0 20px rgba(16,185,129,.35);
    }
    .mesa-card.ocupada {
      border-color: rgba(239,68,68,.5);
      box-shadow: 0 0 12px rgba(239,68,68,.2);
    }
    .mesa-card.ocupada:hover {
      border-color: #ef4444;
      box-shadow: 0 0 20px rgba(239,68,68,.4);
    }

    .mesa-numero { font-size: 1.8rem; font-weight: 700; color: #fff; line-height: 1; }
    .mesa-label  { font-size: 0.65rem; color: #a0aec0; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    .mesa-estado {
      margin-top: 10px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
    }
    .estado-libre   { background: rgba(16,185,129,.15); color: #10b981; }
    .estado-ocupada { background: rgba(239,68,68,.15);  color: #ef4444; }

    .mesa-total  { margin-top: 6px; font-size: 0.75rem; color: #00e5ff; font-weight: 600; }
    .mesa-mesero { margin-top: 3px; font-size: 0.68rem; color: #a0aec0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* MODAL */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.show { display: flex; }

    .modal-box {
      background: linear-gradient(135deg, #1a1f3a 0%, #1e2442 100%);
      border: 1px solid rgba(0,191,255,.25);
      border-radius: 18px;
      width: 100%;
      max-width: 520px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }

    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: sticky;
      top: 0;
      background: linear-gradient(135deg, #1a1f3a 0%, #1e2442 100%);
      z-index: 10;
    }
    .modal-header h2 { font-size: 1.15rem; color: #00e5ff; }
    .modal-header .meta { font-size: 0.78rem; color: #a0aec0; margin-top: 3px; }

    .btn-close { background: none; border: none; color: #a0aec0; font-size: 1.4rem; cursor: pointer; padding: 0 4px; line-height: 1; }
    .btn-close:hover { color: #fff; }

    .modal-body { padding: 20px 24px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .info-card { background: rgba(255,255,255,.04); border-radius: 10px; padding: 12px; }
    .info-card label { font-size: 0.7rem; color: #a0aec0; text-transform: uppercase; letter-spacing: .5px; }
    .info-card p    { font-size: 0.95rem; color: #fff; font-weight: 600; margin-top: 3px; }

    .productos-lista h3 { font-size: 0.85rem; color: #a0aec0; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }

    .producto-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 12px;
      background: rgba(255,255,255,.03);
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 0.85rem;
    }
    .producto-row .nombre   { color: #fff; flex: 1; }
    .producto-row .cantidad { color: #00e5ff; margin: 0 12px; min-width: 30px; text-align: center; }
    .producto-row .precio   { color: #10b981; font-weight: 600; min-width: 80px; text-align: right; }

    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 14px 12px;
      border-top: 1px solid rgba(255,255,255,.1);
      margin-top: 8px;
      font-weight: 700;
    }
    .total-row .label { color: #a0aec0; }
    .total-row .monto { color: #00e5ff; font-size: 1.15rem; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }

    .btn-primary {
      flex: 1; background: linear-gradient(135deg, #0066ff, #0080ff);
      color: #fff; border: none; padding: 12px 16px; border-radius: 10px;
      cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all .2s; min-width: 120px;
    }
    .btn-primary:hover { opacity: .85; transform: translateY(-1px); }

    .btn-success {
      flex: 1; background: linear-gradient(135deg, #059669, #10b981);
      color: #fff; border: none; padding: 12px 16px; border-radius: 10px;
      cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all .2s; min-width: 120px;
    }
    .btn-success:hover { opacity: .85; }

    .stat-bar { display: flex; gap: 20px; padding: 12px 24px; background: rgba(0,0,0,.2); font-size: 0.82rem; flex-wrap: wrap; }
    .stat-bar span   { color: #a0aec0; }
    .stat-bar strong { color: #00e5ff; }

    .refresh-btn {
      background: rgba(0,191,255,.1); border: 1px solid rgba(0,191,255,.3);
      color: #00bfff; padding: 8px 14px; border-radius: 8px; cursor: pointer;
      font-size: 0.82rem; transition: all .2s;
    }
    .refresh-btn:hover { background: rgba(0,191,255,.2); }

    .empty-state { text-align: center; padding: 20px; color: #a0aec0; font-size: 0.85rem; }
    .loading     { text-align: center; padding: 60px; color: #a0aec0; }
    .cat-btn-pos {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: #a0aec0; padding: 5px 12px;
      border-radius: 20px; cursor: pointer;
      font-size: 0.75rem; white-space: nowrap;
      transition: all .2s; flex-shrink: 0;
    }
    .cat-btn-pos.active, .cat-btn-pos:hover {
      background: rgba(0,191,255,.15);
      border-color: rgba(0,191,255,.4);
      color: #00e5ff;
    }
    .prod-card-pos {
      background: linear-gradient(135deg,#1a1f3a,#1e2442);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px; padding: 12px 8px;
      text-align: center; cursor: pointer; transition: all .2s;
    }
    .prod-card-pos:hover {
      border-color: rgba(0,191,255,.4);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,191,255,.15);
    }
    .carrito-item-pos {
      background: rgba(255,255,255,.04);
      border-radius: 8px; padding: 8px 10px;
      margin-bottom: 6px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .ci-btn-pos {
      background: rgba(0,191,255,.15);
      border: 1px solid rgba(0,191,255,.3);
      color: #00bfff; width: 22px; height: 22px;
      border-radius: 5px; cursor: pointer; font-size: 0.85rem;
      display: inline-flex; align-items: center; justify-content: center;
    }
    #productosGrid::-webkit-scrollbar { width: 3px; }
    #productosGrid::-webkit-scrollbar-thumb { background: rgba(0,191,255,.3); border-radius: 2px; }
    #carritoItems::-webkit-scrollbar { width: 3px; }
    #carritoItems::-webkit-scrollbar-thumb { background: rgba(0,191,255,.3); border-radius: 2px; }
    #categoriasPos::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  <div class="mesas-header">
    <div>
      <h1>🪑 Mapa de Mesas — Ice Vibe</h1>
      <p id="subtitulo">Cargando...</p>
    </div>
    <div class="header-actions">
      <button class="refresh-btn" onclick="cargarMesas()">🔄 Actualizar</button>
      <a id="btnVolver" href="#" class="btn-back">← Volver</a>
    </div>
  </div>

  <div class="stat-bar">
    <span>Mesas libres: <strong id="statLibres">-</strong></span>
    <span>Mesas ocupadas: <strong id="statOcupadas">-</strong></span>
    <span>Total consumiendo: <strong id="statTotal">-</strong></span>
  </div>

  <div class="leyenda">
    <div class="leyenda-item"><div class="leyenda-dot dot-libre"></div> Libre</div>
    <div class="leyenda-item"><div class="leyenda-dot dot-ocupada"></div> Ocupada</div>
  </div>

  <div class="mesas-container" id="mesasContainer">
    <div class="loading">Cargando mesas...</div>
  </div>

<!-- MODAL POS COMPLETO -->
  <div class="modal-overlay" id="modalMesa" style="align-items:flex-start;padding:16px;overflow-y:auto;">
    <div style="background:linear-gradient(135deg,#0d1230,#0a0e27);border:1px solid rgba(0,191,255,.25);border-radius:18px;width:100%;max-width:1100px;margin:auto;box-shadow:0 20px 60px rgba(0,0,0,.7);">

      <!-- Header -->
      <div style="padding:18px 24px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#1a1f3a,#1e2442);border-radius:18px 18px 0 0;position:sticky;top:0;z-index:10;">
        <div>
          <h2 id="modalTitulo" style="font-size:1.1rem;color:#00e5ff;">Mesa</h2>
          <div id="modalMeta" style="font-size:0.78rem;color:#a0aec0;margin-top:2px;"></div>
        </div>
        <button class="btn-close" onclick="cerrarModal()">✕</button>
      </div>

      <!-- Layout: productos | carrito -->
      <div id="posLayout" style="display:grid;grid-template-columns:1fr 320px;min-height:580px;">

        <!-- Panel productos -->
        <div style="padding:20px;border-right:1px solid rgba(255,255,255,.06);">
          <!-- Info mesa ocupada -->
          <div id="infoMesaOcupada" style="display:none;margin-bottom:16px;"></div>
          <!-- Categorías -->
          <div id="categoriasPos" style="display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none;"></div>
          <!-- Grid productos -->
          <div id="productosGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;max-height:460px;overflow-y:auto;padding-right:4px;"></div>
        </div>

        <!-- Panel carrito -->
        <div style="padding:20px;display:flex;flex-direction:column;background:rgba(0,0,0,.2);border-radius:0 0 18px 0;">
          <div style="font-size:0.82rem;color:#a0aec0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;font-weight:600;">🛒 Orden Mesa <span id="carritoNumMesa">-</span></div>

          <!-- Consumo previo (si mesa ocupada) -->
          <div id="consumoPrevioBox" style="display:none;margin-bottom:10px;">
            <div style="font-size:0.72rem;color:#a0aec0;text-transform:uppercase;margin-bottom:6px;">Ya consumido</div>
            <div id="consumoPrevioItems"></div>
            <div style="display:flex;justify-content:space-between;font-size:0.8rem;padding:6px 0;border-top:1px solid rgba(255,255,255,.06);margin-top:4px;">
              <span style="color:#a0aec0;">Subtotal previo</span>
              <span style="color:#10b981;" id="consumoPrevioTotal">$0</span>
            </div>
            <div style="border-bottom:1px solid rgba(255,255,255,.06);margin:8px 0;"></div>
            <div style="font-size:0.72rem;color:#a0aec0;margin-bottom:6px;">Agregar más:</div>
          </div>

          <!-- Items carrito -->
          <div id="carritoItems" style="flex:1;overflow-y:auto;max-height:280px;margin-bottom:10px;">
            <div style="text-align:center;padding:30px;color:#a0aec0;font-size:0.85rem;">Selecciona productos</div>
          </div>

          <!-- Totales -->
          <div style="border-top:1px solid rgba(255,255,255,.08);padding-top:10px;margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:5px;">
              <span style="color:#a0aec0;">Subtotal nuevo</span>
              <span style="color:#fff;" id="posSubtotal">$0</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:1rem;font-weight:700;">
              <span style="color:#fff;">TOTAL MESA</span>
              <span style="color:#00e5ff;" id="posTotal">$0</span>
            </div>
          </div>

          <!-- Botones -->
          <button id="btnRegistrar" onclick="posRegistrarVenta()" disabled
            style="width:100%;padding:12px;background:linear-gradient(135deg,#059669,#10b981);color:#fff;border:none;border-radius:10px;font-size:0.9rem;font-weight:700;cursor:pointer;margin-bottom:8px;opacity:.4;">
            💳 Registrar y cobrar
          </button>
          <button id="btnPosWhatsapp" onclick="posEnviarWhatsApp()" disabled
            style="width:100%;padding:10px;background:linear-gradient(135deg,#075e54,#128c7e);color:#fff;border:none;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;margin-bottom:8px;opacity:.4;">
            📱 Enviar WhatsApp
          </button>
          <button onclick="cerrarModal()"
            style="width:100%;padding:10px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;border-radius:10px;font-size:0.85rem;cursor:pointer;">
            Cancelar
          </button>
        </div>
      </div>
    </div>
  </div>

<script src="js/config.js"></script>
  <script>
    const session = JSON.parse(localStorage.getItem('session') || 'null')
    if (!session) window.location.href = 'index.html'

    const esAdmin  = session?.rol === 'ADMIN'
    const esMesero = session?.rol === 'VENDEDOR'

    document.getElementById('btnVolver').href = esAdmin ? 'dashboard-admin.html' : 'pos-mesero.html'

    let mesaActual     = null
    let todosProductos = []
    let carrito        = []
    let categoriaActual = 'TODAS'
    let consumoPrevio  = []
    let totalPrevio    = 0

    function fmt(val) {
      return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', minimumFractionDigits: 0 }).format(val || 0)
    }
    function fmtHora(iso) {
      if (!iso) return 'N/A'
      return new Date(iso).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' })
    }
    function icono(nombre) {
      if (!nombre) return '🥤'
      const n = nombre.toLowerCase()
      if (n.includes('cerveza') || n.includes('club') || n.includes('águila') || n.includes('aguila') ||
          n.includes('poker') || n.includes('corona') || n.includes('budwei') || n.includes('bretaña') ||
          n.includes('four') || n.includes('smirnoff')) return '🍺'
      if (n.includes('shot') || n.includes('tequila') || n.includes('vodka') || n.includes('ron') ||
          n.includes('aguardiente') || n.includes('jagger')) return '🥃'
      if (n.includes('granizado') || n.includes('cremoso') || n.includes('ice') || n.includes('vibe') ||
          n.includes('soda') || n.includes('michelada') || n.includes('coctelada')) return '🧊'
      if (n.includes('perla') || n.includes('fruta') || n.includes('endulza')) return '🍬'
      return '🥤'
    }

    // ===== MESAS =====
    async function cargarMesas() {
      try {
        const mesas = await window.apiRequest('/mesas')
        if (!Array.isArray(mesas) || mesas.length === 0) {
          await window.apiRequest('/mesas/inicializar', { method: 'POST' })
          return cargarMesas()
        }
        renderMesas(mesas)
      } catch (e) {
        document.getElementById('mesasContainer').innerHTML = '<div class="loading">❌ Error cargando mesas.</div>'
      }
    }

    function renderMesas(mesas) {
      const libres   = mesas.filter(m => m.estado === 'LIBRE').length
      const ocupadas = mesas.filter(m => m.estado === 'OCUPADA').length
      const totalC   = mesas.filter(m => m.estado === 'OCUPADA').reduce((s, m) => s + parseFloat(m.totalConsumido || 0), 0)
      document.getElementById('statLibres').textContent   = libres
      document.getElementById('statOcupadas').textContent = ocupadas
      document.getElementById('statTotal').textContent    = fmt(totalC)
      document.getElementById('subtitulo').textContent    = `${ocupadas} mesas ocupadas · ${libres} libres`
      document.getElementById('mesasContainer').innerHTML = mesas.map(m => `
        <div class="mesa-card ${m.estado.toLowerCase()}" onclick="abrirMesa(${m.numero})">
          <div class="mesa-numero">${m.numero}</div>
          <div class="mesa-label">Mesa</div>
          <div class="mesa-estado estado-${m.estado.toLowerCase()}">${m.estado}</div>
          ${m.estado === 'OCUPADA' ? `
            <div class="mesa-total">${fmt(m.totalConsumido)}</div>
            <div class="mesa-mesero">👤 ${m.meseroNombre || '-'}</div>
          ` : ''}
        </div>
      `).join('')
    }

    // ===== ABRIR MESA =====
    async function abrirMesa(numero) {
      try {
        const data = await window.apiRequest(`/mesas/${numero}`)
        if (!data.success) { alert('Error al cargar la mesa'); return }

        mesaActual    = data.mesa
        carrito       = []
        consumoPrevio = data.productos || []
        totalPrevio   = parseFloat(data.totalConsumido || 0)

        document.getElementById('modalTitulo').textContent  = `Mesa ${numero}`
        document.getElementById('carritoNumMesa').textContent = numero

        const estado = mesaActual.estado === 'OCUPADA'
          ? `<span style="color:#ef4444">● OCUPADA</span> · 👤 ${mesaActual.meseroNombre || '-'} · ⏰ ${fmtHora(mesaActual.horaApertura)}`
          : `<span style="color:#10b981">● LIBRE</span> · Listo para tomar pedido`
        document.getElementById('modalMeta').innerHTML = estado

        // Consumo previo
        if (mesaActual.estado === 'OCUPADA' && consumoPrevio.length > 0) {
          document.getElementById('consumoPrevioBox').style.display = 'block'
          document.getElementById('consumoPrevioItems').innerHTML = consumoPrevio.map(p => `
            <div style="display:flex;justify-content:space-between;font-size:0.78rem;padding:4px 6px;background:rgba(255,255,255,.03);border-radius:5px;margin-bottom:3px;">
              <span style="color:#a0aec0;">${p.productoNombre} ×${p.cantidad}</span>
              <span style="color:#10b981;">${fmt(p.subtotal)}</span>
            </div>
          `).join('')
          document.getElementById('consumoPrevioTotal').textContent = fmt(totalPrevio)
        } else {
          document.getElementById('consumoPrevioBox').style.display = 'none'
        }

        actualizarCarrito()
        await cargarProductosPos()
        document.getElementById('modalMesa').classList.add('show')

      } catch(e) {
        alert('Error al abrir mesa: ' + e.message)
      }
    }

    function cerrarModal() {
      document.getElementById('modalMesa').classList.remove('show')
      mesaActual = null; carrito = []; consumoPrevio = []; totalPrevio = 0
    }

    // ===== PRODUCTOS POS =====
    async function cargarProductosPos() {
      try {
        const res = await window.apiRequest('/productos/activos')
        todosProductos = Array.isArray(res) ? res : res.data || []
        renderCategoriasPos()
        renderProductosPos()
      } catch(e) {
        document.getElementById('productosGrid').innerHTML =
          '<p style="color:#ef4444;text-align:center;grid-column:1/-1">Error cargando productos</p>'
      }
    }

    function renderCategoriasPos() {
      const cats = ['TODAS', ...new Set(todosProductos.map(p => p.categoria))]
      document.getElementById('categoriasPos').innerHTML = cats.map(c => `
        <button class="cat-btn-pos ${c === categoriaActual ? 'active' : ''}"
          onclick="filtrarCatPos(this,'${c}')">${c}</button>
      `).join('')
    }

    function filtrarCatPos(el, cat) {
      categoriaActual = cat
      document.querySelectorAll('.cat-btn-pos').forEach(b => b.classList.remove('active'))
      el.classList.add('active')
      renderProductosPos()
    }

    function renderProductosPos() {
      const grid = document.getElementById('productosGrid')
      const filtrados = categoriaActual === 'TODAS'
        ? todosProductos
        : todosProductos.filter(p => p.categoria === categoriaActual)

      if (filtrados.length === 0) {
        grid.innerHTML = '<p style="color:#a0aec0;text-align:center;grid-column:1/-1">Sin productos</p>'
        return
      }
      grid.innerHTML = filtrados.map(p => `
        <div class="prod-card-pos" onclick="agregarAlCarrito(${p.id})">
          <div style="font-size:1.6rem;margin-bottom:5px;">${icono(p.nombre)}</div>
          <div style="font-size:0.75rem;color:#fff;font-weight:600;margin-bottom:3px;line-height:1.3;">${p.nombre}</div>
          <div style="font-size:0.8rem;color:#00e5ff;font-weight:700;">${fmt(p.precio)}</div>
          <div style="font-size:0.65rem;color:#10b981;margin-top:2px;">Stock: ${p.stock || 0}</div>
        </div>
      `).join('')
    }

    // ===== CARRITO =====
    function agregarAlCarrito(productoId) {
      const prod = todosProductos.find(p => p.id === productoId)
      if (!prod) return
      const existe = carrito.find(i => i.producto.id === productoId)
      if (existe) existe.cantidad++
      else carrito.push({ producto: prod, cantidad: 1 })
      actualizarCarrito()
    }

    function cambiarCantidadPos(index, delta) {
      carrito[index].cantidad += delta
      if (carrito[index].cantidad <= 0) carrito.splice(index, 1)
      actualizarCarrito()
    }

    function actualizarCarrito() {
      const container = document.getElementById('carritoItems')
      const btnReg = document.getElementById('btnRegistrar')
      const btnWA  = document.getElementById('btnPosWhatsapp')

      if (carrito.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:30px;color:#a0aec0;font-size:0.85rem;">Selecciona productos para agregar</div>'
      } else {
        container.innerHTML = carrito.map((item, i) => `
          <div class="carrito-item-pos">
            <div style="flex:1;">
              <div style="font-size:0.8rem;color:#fff;font-weight:600;">${item.producto.nombre}</div>
              <div style="font-size:0.75rem;color:#00e5ff;">${fmt(item.producto.precio * item.cantidad)}</div>
            </div>
            <div style="display:flex;align-items:center;gap:5px;">
              <button class="ci-btn-pos" onclick="cambiarCantidadPos(${i},-1)">−</button>
              <span style="font-size:0.85rem;color:#fff;min-width:18px;text-align:center;">${item.cantidad}</span>
              <button class="ci-btn-pos" onclick="cambiarCantidadPos(${i},1)">+</button>
            </div>
          </div>
        `).join('')
      }

      // Activo si hay carrito nuevo O si la mesa está ocupada
      const hayAlgo = carrito.length > 0 || (mesaActual && mesaActual.estado === 'OCUPADA')
      btnReg.disabled = !hayAlgo; btnReg.style.opacity = hayAlgo ? '1' : '.4'
      btnWA.disabled  = !hayAlgo; btnWA.style.opacity  = hayAlgo ? '1' : '.4'

      const subtotalNuevo = carrito.reduce((s, i) => s + i.producto.precio * i.cantidad, 0)
      document.getElementById('posSubtotal').textContent = fmt(subtotalNuevo)
      document.getElementById('posTotal').textContent    = fmt(totalPrevio + subtotalNuevo)
    }

    // ===== WHATSAPP =====
    async function posEnviarWhatsApp() {
      if (carrito.length === 0) { alert('El carrito está vacío'); return }
      const subtotalNuevo = carrito.reduce((s, i) => s + i.producto.precio * i.cantidad, 0)
      const totalMesa = totalPrevio + subtotalNuevo

      let msg = `🧊 *PEDIDO ICE VIBE* 🧊\n\n🪑 Mesa: ${mesaActual.numero}\n👨‍💼 ${session.nombre}\n\n`
      if (consumoPrevio.length > 0) {
        msg += `*YA CONSUMIDO:*\n`
        consumoPrevio.forEach(p => { msg += `• ${p.productoNombre} ×${p.cantidad} = ${fmt(p.subtotal)}\n` })
        msg += `\n`
      }
      msg += `*NUEVOS:*\n`
      carrito.forEach(i => { msg += `• ${i.producto.nombre} ×${i.cantidad} = ${fmt(i.producto.precio * i.cantidad)}\n` })
      msg += `\n━━━━━━━━━━━━━━━━\n💰 *TOTAL: ${fmt(totalMesa)}*\n\n¡Gracias! 🎉`

      const tel = window.API_CONFIG.WHATSAPP_NUMBER.replace(/\D/g, '')
      window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank')
      await posRegistrarVenta()
    }

    // ===== COBRAR MESA (desde botón de cobrar si mesa ocupada) =====
    async function cobrarMesa(numero) {
      if (!confirm(`¿Confirmar pago y liberar la Mesa ${numero}?`)) return
      try {
        const res = await window.apiRequest(`/mesas/${numero}/liberar`, { method: 'POST' })
        if (res.success) {
          cerrarModal(); cargarMesas()
          alert(`✅ Mesa ${numero} liberada. ¡Pago registrado!`)
        } else { alert('Error: ' + res.message) }
      } catch(e) { alert('Error al liberar mesa') }
    }

    function irAPOS(numero) {
      sessionStorage.setItem('mesaPreseleccionada', numero)
      window.location.href = 'pos-mesero.html'
    }

    cargarMesas()
    setInterval(cargarMesas, 30000)
    document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal() })
  </script>
</body>
</html>
